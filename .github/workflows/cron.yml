name: Smart Build & Deploy

permissions:
  contents: write

on:
  schedule:
    # Every 30 min between 09:15–14:30 IST
    - cron: "45 3 * * *"
    - cron: "15,45 4-8 * * *"
    - cron: "0 9 * * *"
    - cron: "30 9 * * *"   # ✅ 15:00 IST (needed for exception window)

  workflow_dispatch:
    inputs:
      force_full:
        description: "Force FULL run (1 = yes, 0 = no)"
        required: false
        default: "0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📦 Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📚 Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests pandas numpy beautifulsoup4 lxml tqdm gnews

      # 🛑 HARD TIME GATE (EXIT if blocked)
      - name: Time Gate (IST)
        run: |
          IST_HOUR=$(TZ="Asia/Kolkata" date +"%H")
          IST_MIN=$(TZ="Asia/Kolkata" date +"%M")

          echo "Current IST: $IST_HOUR:$IST_MIN"

          if (
              ([ "$IST_HOUR" = "14" ] && [ "$IST_MIN" -ge 30 ]) ||
              ([ "$IST_HOUR" = "15" ] && [ "$IST_MIN" -gt 5 ]) ||
              ([ "$IST_HOUR" = "16" ] && [ "$IST_MIN" -lt 45 ])
             ); then

            if [ "$IST_HOUR" = "15" ] && [ "$IST_MIN" -le 5 ]; then
              echo "Allowed exception window (15:00–15:05)"
            else
              echo "Blocked time window. Exiting workflow."
              exit 0
            fi
          fi

      # 🧠 Decide mode (FULL vs LIGHT + FORCE)
      - name: Decide execution mode
        id: timecheck
        run: |
          FORCE="${{ github.event.inputs.force_full }}"
          EVENT="${{ github.event_name }}"

          echo "Force: $FORCE | Event: $EVENT"

          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" = "1" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=light" >> $GITHUB_OUTPUT
          fi

      # 🚀 FULL RUN
      - name: Full Run (Heavy Scripts + Telegram)
        if: steps.timecheck.outputs.mode == 'full'
        run: |
          echo "Running FULL mode"

          curl -s -X POST "https://api.telegram.org/bot5588744140:AAFMzYGBbQDzZ_hYDf9d1WSTHmC3I-Z3kZk/sendMessage" \
          -d chat_id="-1002683944312" \
          -d text="Full update started..."

          python -u fetch_news.py || echo "news failed"
          python n500.py || echo "n500 failed"
          python nm250.py || echo "nm250 failed"
          python ns500.py || echo "ns500 failed"
          python build.py || echo "build failed"

      # ⚡ LIGHT RUN
      - name: Light Run (News + Build only)
        if: steps.timecheck.outputs.mode == 'light'
        run: |
          echo "Running LIGHT mode"

          python -u fetch_news.py || echo "news failed"
          python build.py || echo "build failed"

      # 💾 Commit changes
      - name: Commit and push CSV + HTML
        continue-on-error: true
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git stash || echo "nothing to stash"
          git pull origin main || echo "pull failed"
          git stash pop || echo "nothing to pop"

          git add nifty500_valuation.csv niftymicrocap250_valuation.csv niftysmallcap500_valuation.csv multi_stock_news.csv public/index.html

          git diff --cached --quiet || git commit -m "Auto-update data [skip ci]" || echo "commit skipped"
          git push origin main || echo "push failed"

      # 🔐 Setup Firebase credentials
      - name: Setup Firebase credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > serviceAccount.json

      # 🔥 Install Firebase CLI
      - name: Install Firebase
        run: npm install -g firebase-tools

      # 🚀 Deploy
      - name: Deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: serviceAccount.json
        run: |
          firebase deploy --project hnimanshu --non-interactive || echo "deploy failed"

      # 📩 Telegram after FULL run
      - name: Telegram Done
        if: steps.timecheck.outputs.mode == 'full'
        run: |
          curl -s -X POST "https://api.telegram.org/bot5588744140:AAFMzYGBbQDzZ_hYDf9d1WSTHmC3I-Z3kZk/sendMessage" \
          -d chat_id="-1002683944312" \
          -d text="https://hnimanshu-value.web.app/ %0A%0AFull update completed 🚀"
