name: Smart Build & Deploy

permissions:
contents: write

on:
schedule:
- cron: "30 18 * * *"    # 00:00 IST (previous day UTC)
- cron: "45 3 * * 1-5"   # 09:15 IST
- cron: "45 4 * * 1-5"   # 10:15 IST
- cron: "45 7 * * 1-5"   # 13:15 IST
- cron: "00 8 * * 1-5"   # 13:30 IST

workflow_dispatch:
inputs:
force_full:
description: "Force FULL run (1 = yes, 0 = no)"
required: false
default: "0"

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  # 📦 Checkout repo
  - name: Checkout code
    uses: actions/checkout@v4

  # 🐍 Setup Python
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  # 📚 Install dependencies
  - name: Install dependencies
    run: |
      pip install -r requirements.txt
      pip install requests pandas numpy beautifulsoup4 lxml tqdm gnews

  # 🧠 Decide mode (FULL / LIGHT / NEWS_ONLY)
  - name: Decide execution mode
    id: mode
    run: |
      FORCE="${{ github.event.inputs.force_full }}"
      EVENT="${{ github.event_name }}"

      IST_HOUR=$(TZ="Asia/Kolkata" date +"%H")
      IST_MIN=$(TZ="Asia/Kolkata" date +"%M")
      IST_TOTAL=$((IST_HOUR * 60 + IST_MIN))

      echo "IST_TOTAL: $IST_TOTAL"

      # 00:00 IST → NEWS ONLY
      if [ "$IST_TOTAL" -ge 0 ] && [ "$IST_TOTAL" -le 5 ]; then
        echo "mode=news" >> $GITHUB_OUTPUT
        echo "📰 News-only run"
        exit 0
      fi

      # Force FULL
      if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" = "1" ]; then
        echo "mode=full" >> $GITHUB_OUTPUT
        exit 0
      fi

      # Full run windows
      FULL_TIMES="555 675 795 870 930"
      RUN_FULL=false

      for t in $FULL_TIMES; do
        DIFF=$(( IST_TOTAL - t ))
        if [ "$DIFF" -ge -7 ] && [ "$DIFF" -le 7 ]; then
          RUN_FULL=true
          break
        fi
      done

      if [ "$RUN_FULL" = "true" ]; then
        echo "mode=full" >> $GITHUB_OUTPUT
      else
        echo "mode=light" >> $GITHUB_OUTPUT
      fi

  # 🚀 FULL RUN
  - name: Full Run
    if: steps.mode.outputs.mode == 'full'
    run: |
      echo "Running FULL mode"

      python -u fetch_news.py
      python n500.py
      python nm250.py
      python ns500.py
      python build.py

  # ⚡ LIGHT RUN
  - name: Light Run
    if: steps.mode.outputs.mode == 'light'
    run: |
      echo "Running LIGHT mode"

      python -u fetch_news.py
      python build.py

  # 📰 NEWS ONLY (00:00 IST)
  - name: News Only Run
    if: steps.mode.outputs.mode == 'news'
    run: |
      echo "Running NEWS ONLY mode"

      python -u fetch_news.py

  # 💾 Commit changes
  - name: Commit and push
    continue-on-error: true
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"

      git stash
      git pull origin main --rebase || true
      git stash pop || true

      git add nifty500_valuation.csv niftymicrocap250_valuation.csv niftysmallcap500_valuation.csv multi_stock_news.csv public/index.html

      git diff --cached --quiet || git commit -m "Auto-update data [skip ci]"
      git push origin main || true

  # 🔐 Firebase credentials
  - name: Setup Firebase credentials
    run: |
      echo '${{ secrets.GOOGLE_CREDENTIALS }}' > serviceAccount.json

  # 🔥 Install Firebase CLI
  - name: Install Firebase
    run: npm install -g firebase-tools

  # 🚀 Deploy
  - name: Deploy
    env:
      GOOGLE_APPLICATION_CREDENTIALS: serviceAccount.json
    run: |
      firebase deploy --project hnimanshu --only hosting --non-interactive

  # 📩 Telegram ONLY if FULL + SUCCESS
  - name: Telegram Success Message
    if: steps.mode.outputs.mode == 'full' && success()
    run: |
      curl -s -X POST "https://api.telegram.org/bot5588744140:AAFMzYGBbQDzZ_hYDf9d1WSTHmC3I-Z3kZk/sendMessage" \
      -d chat_id="-1002683944312" \
      -d text="https://hnimanshu-value.web.app/ %0A%0AFull update completed 🚀"
