# keep-alive

name: Daily Build & Deploy

permissions:
  contents: write

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests pandas numpy beautifulsoup4 lxml tqdm

      # 🔥 Run scripts but DON'T stop workflow on error
      # 📩 Telegram Alert (ALWAYS RUNS)
      - name: Send Telegram Alert Before
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot5588744140:AAFMzYGBbQDzZ_hYDf9d1WSTHmC3I-Z3kZk/sendMessage" \
          -d chat_id="-1002683944312" \
          -d text="Website updation started..."

      - name: Run scripts
        continue-on-error: true
        run: |
          echo "Running n500.py..."
          python n500.py || echo "n500 failed"

          echo "Running nm250.py..."
          python nm250.py || echo "nm250 failed"

          echo "Running build.py..."
          python build.py || echo "build failed"

      # ✅ FIXED COMMIT STEP
      - name: Commit and push CSV + HTML
        continue-on-error: true
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global pull.rebase false

          git stash || echo "nothing to stash"
          git pull origin main || echo "pull failed"
          git stash pop || echo "nothing to pop"

          git add nifty500_valuation.csv niftymicrocap250_valuation.csv public/index.html

          git diff --cached --quiet || git commit -m "Auto-update data [skip ci]" || echo "commit skipped"

          git push origin main || echo "push failed"

      - name: Setup Firebase credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > serviceAccount.json

      - name: Install Firebase
        run: npm install -g firebase-tools

      # 🔥 Deploy even if previous steps failed
      - name: Deploy
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: serviceAccount.json
        run: |
          firebase deploy --project hnimanshu --non-interactive || echo "deploy failed"

      # 📩 Telegram Alert (ALWAYS RUNS)
      - name: Send Telegram Alert
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot5588744140:AAFMzYGBbQDzZ_hYDf9d1WSTHmC3I-Z3kZk/sendMessage" \
          -d chat_id="-1002683944312" \
          -d text="https://hnimanshu-value.web.app/ \n\nUpdated from Action - [Daily Build And Deploy] \n\nFrom https://github.com/USS920/HNImanshu_value/actions\n\nEdit here: https://github.com/USS920/HNImanshu_value/blob/main/.github/workflows/cron.yml"
